<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ร้านค้าออนไลน์ของฉัน</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background: #eee; padding: 0.5rem; }
        nav a { margin: 0 1rem; text-decoration: none; color: #333; }
        .hero { padding: 2rem; text-align: center; background: #f4f4f4; }
        .products { display: flex; justify-content: center; gap: 20px; padding: 2rem; }
        .product-card { border: 1px solid #ddd; padding: 1rem; width: 200px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>ยินดีต้อนรับสู่ร้านค้าของเรา</h1>
    </header>
    <nav>
        <a href="#">หน้าแรก</a>
        <a href="#">สินค้าทั้งหมด</a>
        <a href="#">ติดต่อเรา</a>
    </nav>
    <section class="hero">
        <h2>สินค้าแนะนำประจำสัปดาห์</h2>
        <p>เลือกซื้อสินค้าคุณภาพดีในราคาพิเศษ</p>
    </section>
    <section class="products">
        <div class="product-card"><h3>สินค้า 1</h3><p>ราคา 100 บาท</p></div>
        <div class="product-card"><h3>สินค้า 2</h3><p>ราคา 200 บาท</p></div>
        <div class="product-card"><h3>สินค้า 3</h3><p>ราคา 300 บาท</p></div>
    </section>
</body>
</html>
